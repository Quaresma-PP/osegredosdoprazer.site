<!DOCTYPE html><html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>10 Prayers for Financial Prosperity</title>
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      font-family: 'Lato', sans-serif;
      background: linear-gradient(135deg, #1a365d 0%, #0f2042 100%);
      background-attachment: fixed;
      color: white;
      min-height: 100vh;
      font-size: 18px;
    }
    .title-font { font-family: 'Cinzel', serif; }
    .golden-text { color: #d4af37; }
    .section-divider { display: flex; align-items: center; margin: 30px 0; }
    .divider-line { flex-grow: 1; height: 2px; background: linear-gradient(to right, transparent, #d4af37, transparent); }
    .divider-icon { font-size: 28px; color: #d4af37; margin: 0 18px; }
    .back-btn { background: none; border: none; color: #d4af37; font-size: 1.1rem; font-weight: bold; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
    .back-btn:hover { color: #fff; text-decoration: underline; }
    .card-ora { background: rgba(10,22,46,0.92); border: 2px solid #d4af37; border-radius: 18px; margin-bottom: 22px; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
    .card-header { cursor: pointer; padding: 18px 22px; display: flex; align-items: center; justify-content: space-between; }
    .card-header h3 { font-size: 1.1rem; margin: 0; color: #d4af37; font-family: 'Cinzel', serif; }
    .card-body { display: none; padding: 0 22px 18px 22px; font-size: 1.05rem; }
    .card-ora.active .card-body { display: block; animation: fadeIn 0.4s; }
    .card-ora.active .fa-chevron-down { transform: rotate(180deg); }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .btn-nav { background: linear-gradient(45deg, #d4af37, #f5e290); color: #0f2042; border: none; font-weight: bold; padding: 10px 22px; border-radius: 30px; margin: 0 8px; font-size: 1rem; }
    .btn-nav:disabled { background: #666; color: #ccc; }
    .btn-copiar { background: none; border: none; color: #d4af37; font-size: 1.1rem; margin-left: 8px; }
    .btn-copiar:hover { color: #fff; }
    .oracao-menu { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 24px; }
    .oracao-btn { background: rgba(212,175,55,0.13); border: 2px solid #d4af37; color: #d4af37; border-radius: 30px; padding: 8px 18px; font-size: 1rem; font-family: 'Cinzel', serif; font-weight: bold; cursor: pointer; transition: all 0.2s; margin-bottom: 4px; }
    .oracao-btn.active, .oracao-btn:focus { background: linear-gradient(45deg, #d4af37, #f5e290); color: #0f2042; border-color: #fff; }
    .oracao-btn:hover { background: #d4af37; color: #0f2042; }
    @media (max-width: 600px) {
      .container { padding: 0 5px; }
      .card-header, .card-body { padding-left: 10px; padding-right: 10px; }
      .btn-nav { width: 100%; margin: 8px 0; }
      .oracao-menu { flex-direction: column; gap: 6px; }
      .oracao-btn { width: 100%; text-align: left; }
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <a href="https://osegredosdoprazer.site/oracoes-especiais" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    <h1 class="title-font golden-text mb-2 text-center">10 Prayers for Financial Prosperity</h1>
    <p class="text-center mb-4">Choose the prayer for your financial need, read it with faith, and share it with those seeking abundance and balance.</p>
    <div class="section-divider"><div class="divider-line"></div><div class="divider-icon"><i class="fas fa-coins"></i></div><div class="divider-line"></div></div>
    <div class="oracao-menu" id="oracaoMenu"></div>
    <div id="oracoes-lista"></div>
    <div class="text-center mt-4">
      <button id="btnAnterior" class="btn-nav" disabled=""><i class="fas fa-arrow-left"></i> Previous</button>
      <button id="btnProximo" class="btn-nav">Next <i class="fas fa-arrow-right"></i></button>
    </div>
    <div class="text-center mt-3 mb-4">
      <a href="https://osegredosdoprazer.site/oracoes-especiais" class="btn btn-outline-light"><i class="fas fa-home me-2"></i> Back to Home</a>
    </div>
  </div>
  <script>
    const oracoes = [
      {
        titulo: 'Prayer for Freedom from Debt',
        texto: `<p>God of Providence, I come to You with a heart afflicted by the debts that weigh upon my life.</p><p>I ask that You open doors to solutions, grant wisdom to negotiate, and discipline to manage every resource.</p><p>May I not despair in the face of bills, but trust that, with effort and faith, financial freedom is possible.</p><p>Take away fear, renew my hope, and ensure that every commitment is honored with dignity.</p><p>May the experience of debt teach me to value what I have and to always seek balance.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for Infinite Abundance',
        texto: `<p>Lord of Abundance, I recognize that everything I have comes from You.</p><p>I ask that Your generosity manifests in my life, multiplying opportunities, resources, and blessings.</p><p>May I know how to share what I receive, without fear of scarcity, and may gratitude be constant in my heart.</p><p>May abundance not make me selfish, but an instrument to help others.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer to Receive Unexpected Money',
        texto: `<p>God of Surprises, I ask that, according to Your will, I may receive unexpected resources to meet my needs.</p><p>May the money come from honest sources, in a blessed way, and without harm to anyone.</p><p>May I know how to recognize each gift as a sign of Your care, and may this prosperity be a reason for praise.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for Wise Management of Resources',
        texto: `<p>Lord, teach me to wisely manage everything that comes into my hands.</p><p>May I know how to save, invest, and spend responsibly, avoiding waste and impulsive choices.</p><p>May every cent be used for good, for growth, and for the realization of my dreams.</p><p>May I never forget to share with those in need.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for Opening New Sources of Income',
        texto: `<p>Creator God, I ask that You open doors to new sources of income in my life.</p><p>May creative ideas arise, may partnerships be blessed, and may work and business opportunities flourish.</p><p>May I have the courage to venture, the willingness to learn, and the humility to start over whenever necessary.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for Success in Investments',
        texto: `<p>Lord, guide my financial decisions and protect my investments.</p><p>May I know how to analyze risks, seek counsel, and act with prudence.</p><p>May the return be fair, blessed, and the fruit of honest work.</p><p>May I not be carried away by greed, but always seek balance and peace.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for the Multiplication of Assets',
        texto: `<p>God of miracles, multiply the assets I already possess, not only for my comfort but so that I may help more people.</p><p>May prosperity be an instrument of sharing, solidarity, and transformation.</p><p>May I know how to recognize each achievement as the fruit of Your grace and my effort.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for Wisdom at Work',
        texto: `<p>Lord, grant me wisdom to make decisions at work, to deal with challenges, and to grow professionally.</p><p>May I be an example of honesty, dedication, and respect.</p><p>May the work environment be healthy, productive, and blessed.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer for the Protection of Assets',
        texto: `<p>Protector God, I ask that you guard my assets, my home, my possessions, and my family.</p><p>Deliver me from loss, theft, accidents, and injustices.</p><p>May everything I have acquired be preserved and used for good.</p><p>May I never place possessions above people, and may generosity always be greater than attachment.</p><p>Amen.</p>`
      },
      {
        titulo: 'Prayer of Gratitude and Prosperity',
        texto: `<p>Lord, I thank you for every blessing received, for every achievement, and for every lesson learned in difficulties.</p><p>May gratitude be the foundation of my prosperity, and may I never forget to praise You in all circumstances.</p><p>May my prosperity be complete: financial, emotional, spiritual, and familial.</p><p>Amen.</p>`
      }
    ];
    let current = 0;
    function renderOracao(idx) {
      const lista = document.getElementById('oracoes-lista');
      lista.innerHTML = '';
      const ora = oracoes[idx];
      const card = document.createElement('div');
      card.className = 'card-ora active';
      card.id = 'card-oracao';
      card.innerHTML = `
        <div class="card-header">
          <h3>${ora.titulo}</h3>
          <button class="btn-copiar" title="Copy prayer" onclick="navigator.clipboard.writeText(document.getElementById('texto-ora').innerText)"><i class="fas fa-copy"></i></button>
        </div>
        <div class="card-body"><span id="texto-ora">${ora.texto}</span></div>
      `;
      lista.appendChild(card);
      document.getElementById('btnAnterior').disabled = idx === 0;
      document.getElementById('btnProximo').disabled = idx === oracoes.length - 1;
      document.querySelectorAll('.oracao-btn').forEach((btn, i) => {
        btn.classList.toggle('active', i === idx);
      });
      setTimeout(() => {
        document.getElementById('card-oracao').scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    }
    document.getElementById('btnAnterior').onclick = function() { if(current>0){ current--; renderOracao(current); document.getElementById('oracaoMenu').scrollIntoView({behavior:'smooth'}); } };
    document.getElementById('btnProximo').onclick = function() { if(current<oracoes.length-1){ current++; renderOracao(current); document.getElementById('oracaoMenu').scrollIntoView({behavior:'smooth'}); } };
    const menu = document.getElementById('oracaoMenu');
    oracoes.forEach((ora, i) => {
      const btn = document.createElement('button');
      btn.className = 'oracao-btn' + (i===0?' active':'');
      btn.innerText = ora.titulo;
      btn.onclick = () => { current = i; renderOracao(i); };
      menu.appendChild(btn);
    });
    renderOracao(current);
  </script>

 </body></html>
